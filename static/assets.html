<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>素材库</title>
    <script>
        (function(){
            try {
                var theme = localStorage.getItem('studio_theme') || localStorage.getItem('canvas_theme') || 'light';
                if(theme === 'dark') document.documentElement.classList.add('studio-theme-dark');
            } catch(e) {}
        })();
    </script>
    <script src="/static/vendor/lucide/lucide.min.js"></script>
    <script src="/static/theme.js?v=20260526-asset-reliability1"></script>
    <style>
        :root {
            --bg:#f7f8fb;
            --panel:#fff;
            --text:#111827;
            --muted:#8a93a3;
            --line:#e5e8ef;
            --soft:#f1f4f8;
            --accent:#0f172a;
            --danger:#dc2626;
            --green:#10b981;
            --shadow:0 22px 60px rgba(15,23,42,.08);
        }
        html.studio-theme-dark {
            --bg:#0f131a;
            --panel:#151b24;
            --text:#eef2f8;
            --muted:#9aa5b5;
            --line:#273241;
            --soft:#1d2632;
            --accent:#f8fafc;
            --danger:#f87171;
            --shadow:0 22px 60px rgba(0,0,0,.28);
        }
        * { box-sizing:border-box; }
        body { margin:0; background:var(--bg); color:var(--text); font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        button, input, textarea { font:inherit; }
        button { cursor:pointer; }
        .page { min-height:100vh; padding:32px; }
        .topbar { max-width:1460px; margin:0 auto 22px; display:flex; align-items:flex-end; justify-content:space-between; gap:18px; }
        .title h1 { margin:0; font-size:30px; line-height:1.1; letter-spacing:0; }
        .title p { margin:8px 0 0; color:var(--muted); font-size:13px; font-weight:700; }
        .actions { display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:flex-end; }
        .btn { height:40px; border:1px solid var(--line); background:var(--panel); color:var(--text); border-radius:999px; padding:0 15px; display:inline-flex; align-items:center; justify-content:center; gap:8px; font-weight:900; font-size:13px; box-shadow:0 8px 22px rgba(15,23,42,.04); }
        .btn:hover { border-color:var(--accent); }
        .btn.primary { background:var(--accent); color:var(--bg); border-color:var(--accent); }
        .btn.danger { color:var(--danger); }
        .icon-btn { width:40px; padding:0; }
        .toolbar { max-width:1460px; margin:0 auto 22px; display:grid; grid-template-columns:minmax(220px, 1fr) auto auto; gap:12px; align-items:center; }
        .search { height:44px; border:1px solid var(--line); background:var(--panel); border-radius:999px; padding:0 16px; color:var(--text); outline:none; font-weight:800; }
        .tabs { display:flex; background:var(--soft); border:1px solid var(--line); border-radius:999px; padding:4px; }
        .tab { border:0; background:transparent; color:var(--muted); height:34px; padding:0 14px; border-radius:999px; font-weight:900; }
        .tab.active { background:var(--panel); color:var(--text); box-shadow:0 8px 24px rgba(15,23,42,.08); }
        .layout { max-width:1460px; margin:0 auto; display:grid; grid-template-columns:minmax(0, 1fr) 360px; gap:22px; align-items:start; }
        .asset-grid { columns:5 180px; column-gap:14px; }
        .asset-card { break-inside:avoid; display:block; margin:0 0 14px; border:1px solid var(--line); border-radius:14px; overflow:hidden; background:var(--panel); position:relative; box-shadow:0 12px 30px rgba(15,23,42,.04); }
        .asset-card:hover { border-color:rgba(15,23,42,.28); transform:translateY(-1px); }
        .asset-card.selected { border-color:var(--accent); box-shadow:0 0 0 2px rgba(15,23,42,.12), 0 14px 34px rgba(15,23,42,.08); }
        .asset-media { position:relative; background:var(--soft); }
        .asset-card img, .asset-card video { width:100%; display:block; background:var(--soft); }
        .asset-card video { min-height:128px; object-fit:cover; }
        .asset-quick { position:absolute; inset:auto 8px 8px 8px; display:flex; gap:6px; justify-content:flex-end; opacity:0; transform:translateY(4px); transition:.16s; }
        .asset-card:hover .asset-quick { opacity:1; transform:translateY(0); }
        .quick-btn, .fav { width:32px; height:32px; border:1px solid rgba(255,255,255,.5); border-radius:999px; background:rgba(255,255,255,.92); color:#111827; display:flex; align-items:center; justify-content:center; box-shadow:0 12px 28px rgba(15,23,42,.14); }
        html.studio-theme-dark .quick-btn, html.studio-theme-dark .fav { background:rgba(15,19,26,.9); color:#eef2f8; border-color:rgba(255,255,255,.12); }
        .fav { position:absolute; top:8px; right:8px; color:#c2a21b; }
        .asset-select { position:absolute; top:8px; left:8px; z-index:2; width:32px; height:32px; border:1px solid rgba(255,255,255,.62); border-radius:999px; background:rgba(255,255,255,.92); color:#111827; display:flex; align-items:center; justify-content:center; box-shadow:0 12px 28px rgba(15,23,42,.14); }
        .asset-select.active { background:var(--accent); color:var(--bg); border-color:var(--accent); }
        html.studio-theme-dark .asset-select { background:rgba(15,19,26,.9); color:#eef2f8; border-color:rgba(255,255,255,.12); }
        .asset-meta { padding:11px; display:flex; flex-direction:column; gap:7px; }
        .asset-title { font-size:12px; font-weight:950; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .asset-prompt { color:var(--muted); font-size:11px; line-height:1.35; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
        .asset-badges { display:flex; gap:6px; flex-wrap:wrap; }
        .badge { border:1px solid var(--line); color:var(--muted); border-radius:999px; padding:3px 7px; font-size:10px; font-weight:900; }
        .side { display:flex; flex-direction:column; gap:16px; position:sticky; top:24px; }
        .panel { background:var(--panel); border:1px solid var(--line); border-radius:18px; padding:16px; box-shadow:var(--shadow); }
        .panel h2 { margin:0 0 12px; font-size:16px; }
        .field { display:flex; flex-direction:column; gap:7px; margin-bottom:10px; }
        .field label { color:var(--muted); font-size:11px; font-weight:950; text-transform:uppercase; }
        .field input, .field textarea { width:100%; border:1px solid var(--line); background:var(--bg); color:var(--text); border-radius:14px; outline:none; padding:11px 12px; font-weight:800; }
        .field textarea { min-height:92px; resize:vertical; line-height:1.45; }
        .prompt-list { display:flex; flex-direction:column; gap:10px; max-height:420px; overflow:auto; }
        .prompt-item { border:1px solid var(--line); border-radius:14px; padding:11px; background:var(--bg); display:flex; flex-direction:column; gap:8px; }
        .prompt-head { display:flex; align-items:center; justify-content:space-between; gap:10px; }
        .prompt-title { font-weight:950; font-size:13px; }
        .prompt-content { color:var(--muted); font-size:12px; line-height:1.45; white-space:pre-wrap; }
        .mini-actions { display:flex; gap:8px; flex-wrap:wrap; }
        .mini { height:30px; border:1px solid var(--line); background:var(--panel); color:var(--text); border-radius:999px; padding:0 10px; font-size:12px; font-weight:900; display:inline-flex; gap:6px; align-items:center; }
        .mini.danger { color:var(--danger); }
        .sync-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:10px 0 12px; }
        .sync-stat { border:1px solid var(--line); background:var(--bg); border-radius:14px; padding:10px; }
        .sync-stat b { display:block; font-size:16px; color:var(--text); margin-top:4px; }
        .sync-stat span, .sync-note { color:var(--muted); font-size:11px; font-weight:900; line-height:1.45; }
        .sync-note { margin-top:10px; }
        .badge.cloud-ok { color:#059669; border-color:rgba(5,150,105,.24); background:rgba(16,185,129,.08); }
        .badge.cloud-fail { color:var(--danger); border-color:rgba(239,68,68,.24); background:rgba(239,68,68,.08); }
        .bulk-bar { max-width:1460px; margin:-8px auto 18px; border:1px solid var(--line); background:rgba(255,255,255,.84); border-radius:18px; padding:10px; display:none; align-items:center; justify-content:space-between; gap:12px; box-shadow:0 12px 34px rgba(15,23,42,.06); }
        html.studio-theme-dark .bulk-bar { background:rgba(15,19,26,.84); }
        .bulk-bar.show { display:flex; }
        .bulk-bar strong { font-size:13px; }
        .bulk-actions { display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
        .empty { border:1px dashed var(--line); border-radius:18px; min-height:260px; display:flex; align-items:center; justify-content:center; color:var(--muted); font-weight:900; text-align:center; padding:24px; background:rgba(255,255,255,.35); }
        .context-menu { position:fixed; z-index:50; width:206px; background:var(--panel); border:1px solid var(--line); border-radius:14px; box-shadow:0 18px 44px rgba(15,23,42,.18); padding:7px; display:none; }
        .context-menu.open { display:block; }
        .context-menu button { width:100%; height:36px; border:0; background:transparent; color:var(--text); border-radius:10px; text-align:left; padding:0 10px; display:flex; align-items:center; gap:8px; font-weight:900; }
        .context-menu button:hover { background:var(--soft); }
        .context-menu button.danger { color:var(--danger); }
        .toast { position:fixed; right:22px; bottom:22px; background:var(--accent); color:var(--bg); border-radius:999px; padding:12px 16px; font-size:13px; font-weight:900; opacity:0; transform:translateY(8px); transition:.18s; pointer-events:none; z-index:70; }
        .toast.show { opacity:1; transform:translateY(0); }
        .preview { position:fixed; inset:0; z-index:65; background:rgba(15,23,42,.45); display:none; align-items:center; justify-content:center; padding:32px; }
        .preview.open { display:flex; }
        .preview-shell { position:relative; width:min(1280px, 94vw); max-height:88vh; background:var(--panel); border-radius:22px; box-shadow:0 28px 90px rgba(15,23,42,.24); overflow:hidden; display:grid; grid-template-columns:minmax(0, 1fr) minmax(320px, 380px); }
        .preview-media-wrap { min-width:0; display:flex; align-items:center; justify-content:center; background:var(--soft); }
        .preview-media { max-width:100%; max-height:88vh; display:block; background:var(--soft); }
        .preview-detail { min-width:0; padding:18px; overflow:auto; max-height:88vh; border-left:1px solid var(--line); }
        .preview-detail h3 { margin:0 0 10px; font-size:16px; }
        .detail-grid { display:grid; grid-template-columns:86px minmax(0, 1fr); gap:9px 12px; font-size:12px; line-height:1.45; }
        .detail-grid dt { color:var(--muted); font-weight:950; }
        .detail-grid dd { margin:0; min-width:0; color:var(--text); font-weight:800; word-break:break-word; white-space:pre-wrap; }
        .param-box { margin-top:12px; border:1px solid var(--line); border-radius:12px; padding:10px; background:var(--bg); color:var(--muted); font-size:11.5px; line-height:1.5; max-height:180px; overflow:auto; white-space:pre-wrap; word-break:break-word; }
        .preview-actions { position:absolute; right:16px; bottom:16px; display:flex; gap:10px; }
        .preview-close { position:absolute; right:16px; top:16px; }
        @media (max-width:1000px) {
            .page { padding:22px 16px; }
            .topbar { align-items:flex-start; flex-direction:column; }
            .toolbar { grid-template-columns:1fr; }
            .layout { grid-template-columns:1fr; }
            .side { position:static; }
            .preview-shell { grid-template-columns:1fr; overflow:auto; }
            .preview-detail { border-left:0; border-top:1px solid var(--line); max-height:none; padding-bottom:76px; }
            .preview-media { max-height:52vh; }
        }
    </style>
</head>
<body>
    <main class="page">
        <header class="topbar">
            <div class="title">
                <h1>素材库</h1>
                <p>生成结果会自动归档；本地素材也可以上传，然后送到无限画布继续创作。</p>
            </div>
            <div class="actions">
                <input id="uploadInput" type="file" accept="image/*,video/*" multiple hidden>
                <button class="btn primary" id="uploadBtn" type="button"><i data-lucide="upload" size="16"></i><span>上传素材</span></button>
                <button class="btn" id="rescanBtn" type="button"><i data-lucide="refresh-cw" size="16"></i><span>扫描历史</span></button>
                <button class="btn" id="newPromptFocusBtn" type="button"><i data-lucide="sparkles" size="16"></i><span>新增提示词</span></button>
            </div>
        </header>

        <section class="toolbar">
            <input class="search" id="assetSearch" placeholder="搜索文件名、模型、提示词">
            <div class="tabs" role="tablist" aria-label="素材类型">
                <button class="tab active" data-type="" type="button">全部</button>
                <button class="tab" data-type="image" type="button">图片</button>
                <button class="tab" data-type="video" type="button">视频</button>
                <button class="tab" data-type="file" type="button">文件</button>
            </div>
            <button class="btn icon-btn" id="favoriteFilterBtn" type="button" title="只看收藏"><i data-lucide="star" size="17"></i></button>
        </section>

        <section id="bulkBar" class="bulk-bar" aria-live="polite">
            <strong id="bulkCount">已选择 0 个素材</strong>
            <div class="bulk-actions">
                <button class="mini" id="bulkCanvasBtn" type="button"><i data-lucide="send-to-back" size="13"></i><span>加入画布</span></button>
                <button class="mini" id="bulkFavBtn" type="button"><i data-lucide="star" size="13"></i><span>收藏</span></button>
                <button class="mini" id="bulkUnfavBtn" type="button"><i data-lucide="star-off" size="13"></i><span>取消收藏</span></button>
                <button class="mini danger" id="bulkDeleteBtn" type="button"><i data-lucide="trash-2" size="13"></i><span>删除所选</span></button>
                <button class="mini" id="bulkClearBtn" type="button"><i data-lucide="x" size="13"></i><span>取消选择</span></button>
            </div>
        </section>

        <section class="layout">
            <div>
                <div id="assetGrid" class="asset-grid"></div>
                <div id="assetEmpty" class="empty" hidden>还没有素材。上传一张图片，或点“扫描历史”把生成记录归档进来。</div>
            </div>

            <aside class="side">
                <section class="panel">
                    <h2>云素材同步</h2>
                    <div id="cloudMediaStatus" class="sync-note">正在读取同步状态...</div>
                    <div class="sync-grid" aria-live="polite">
                        <div class="sync-stat"><span>本地素材</span><b id="syncLocalCount">-</b></div>
                        <div class="sync-stat"><span>本地容量</span><b id="syncLocalSize">-</b></div>
                        <div class="sync-stat"><span>已同步</span><b id="syncSyncedCount">-</b></div>
                        <div class="sync-stat"><span>待同步</span><b id="syncPendingCount">-</b></div>
                        <div class="sync-stat"><span>同步失败</span><b id="syncFailedCount">-</b></div>
                        <div class="sync-stat"><span>最后同步</span><b id="syncLastTime">-</b></div>
                        <div class="sync-stat"><span>云端素材</span><b id="syncRemoteCount">-</b></div>
                        <div class="sync-stat"><span>云端容量</span><b id="syncRemoteSize">-</b></div>
                    </div>
                    <div class="mini-actions">
                        <button class="mini" id="syncNowBtn" type="button"><i data-lucide="cloud-upload" size="13"></i><span>立刻同步</span></button>
                        <button class="mini" id="restoreMissingBtn" type="button"><i data-lucide="cloud-download" size="13"></i><span>恢复缺失</span></button>
                        <button class="mini" id="syncPruneBtn" type="button"><i data-lucide="cloud-off" size="13"></i><span>清理云端</span></button>
                    </div>
                    <div id="cloudMediaLastResult" class="sync-note">自动同步会在素材生成、上传、扫描后触发，并定时补偿未同步文件。</div>
                    <div class="sync-note">立刻同步会把本地素材补传到云端；恢复缺失会从云端补回本地文件；清理云端会删除云端孤儿文件。主动删除过的素材不会被自动恢复。</div>
                </section>

                <section class="panel">
                    <h2>提示词库</h2>
                    <div class="field">
                        <label for="promptTitle">标题</label>
                        <input id="promptTitle" placeholder="例如：产品摄影">
                    </div>
                    <div class="field">
                        <label for="promptContent">提示词</label>
                        <textarea id="promptContent" placeholder="写入常用的高质量提示词"></textarea>
                    </div>
                    <div class="field">
                        <label for="promptTags">标签</label>
                        <input id="promptTags" placeholder="逗号分隔，例如：写实, 电商">
                    </div>
                    <div class="actions" style="justify-content:flex-start">
                        <button class="btn primary" id="savePromptBtn" type="button"><i data-lucide="plus" size="16"></i><span>保存</span></button>
                        <button class="btn" id="clearPromptBtn" type="button"><i data-lucide="eraser" size="16"></i><span>清空</span></button>
                    </div>
                </section>

                <section class="panel">
                    <h2>常用提示词</h2>
                    <div id="promptList" class="prompt-list"></div>
                </section>
            </aside>
        </section>
    </main>

    <div id="contextMenu" class="context-menu" role="menu">
        <button type="button" data-action="canvas"><i data-lucide="send-to-back" size="15"></i><span>加入无限画布</span></button>
        <button type="button" data-action="preview"><i data-lucide="scan-eye" size="15"></i><span>打开预览</span></button>
        <button type="button" data-action="download"><i data-lucide="download" size="15"></i><span>下载</span></button>
        <button type="button" data-action="favorite"><i data-lucide="star" size="15"></i><span>收藏</span></button>
        <button type="button" data-action="prompt"><i data-lucide="send" size="15"></i><span>提示词到文生图</span></button>
        <button type="button" data-action="reuse"><i data-lucide="repeat-2" size="15"></i><span>复用参数生成</span></button>
        <button class="danger" type="button" data-action="delete"><i data-lucide="trash-2" size="15"></i><span>删除素材</span></button>
    </div>

    <div id="preview" class="preview" onclick="closePreview()">
        <div class="preview-shell" onclick="event.stopPropagation()">
            <button class="btn icon-btn preview-close" type="button" onclick="closePreview()" title="关闭"><i data-lucide="x" size="18"></i></button>
            <div id="previewMedia"></div>
            <div id="previewDetail" class="preview-detail"></div>
            <div class="preview-actions">
                <button class="btn" id="previewReuseBtn" type="button"><i data-lucide="repeat-2" size="16"></i><span>复用参数</span></button>
                <button class="btn" id="previewCanvasBtn" type="button"><i data-lucide="send-to-back" size="16"></i><span>加入画布</span></button>
                <button class="btn primary" id="previewDownloadBtn" type="button"><i data-lucide="download" size="16"></i><span>下载</span></button>
            </div>
        </div>
    </div>
    <div id="toast" class="toast"></div>

    <script>
        const state = { type:'', q:'', favorite:null, assets:[], prompts:[], activeAsset:null, previewAsset:null, syncBusy:false, selected:new Set() };
        const $ = id => document.getElementById(id);

        function showToast(text){
            const el = $('toast');
            el.textContent = text;
            el.classList.add('show');
            clearTimeout(showToast.timer);
            showToast.timer = setTimeout(() => el.classList.remove('show'), 1800);
        }
        function esc(value){
            return String(value || '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
        }
        async function jsonOrThrow(res){
            const data = await res.json().catch(() => ({}));
            if(!res.ok) throw new Error(data.detail || '请求失败');
            return data;
        }
        function tagArray(value){ return String(value || '').split(',').map(x => x.trim()).filter(Boolean); }
        function dimsFor(asset){ return asset.width && asset.height ? `${asset.width} x ${asset.height}` : asset.type; }
        function formatBytes(bytes){
            const value = Number(bytes || 0);
            if(!Number.isFinite(value) || value <= 0) return '0 B';
            const units = ['B', 'KB', 'MB', 'GB', 'TB'];
            const index = Math.min(Math.floor(Math.log(value) / Math.log(1024)), units.length - 1);
            return `${(value / Math.pow(1024, index)).toFixed(index ? 1 : 0)} ${units[index]}`;
        }
        function formatTime(value){
            const n = Number(value || 0);
            if(!n) return '-';
            const ms = n > 100000000000 ? n : n * 1000;
            const d = new Date(ms);
            if(Number.isNaN(d.getTime())) return '-';
            return d.toLocaleTimeString();
        }
        function cloudBadge(asset){
            if(asset.cloud_error) return '<span class="badge cloud-fail">同步失败</span>';
            if(asset.cloud_synced_at) return '<span class="badge cloud-ok">已同步</span>';
            return '<span class="badge">未同步</span>';
        }
        function generationFor(asset){
            return asset?.generation || asset?.metadata || {};
        }
        function prettyJson(value){
            if(!value) return '';
            try { return JSON.stringify(value, null, 2); } catch(e) { return String(value); }
        }
        function formatFullTime(value){
            const n = Number(value || 0);
            if(!n) return '-';
            const ms = n > 100000000000 ? n : n * 1000;
            const d = new Date(ms);
            return Number.isNaN(d.getTime()) ? '-' : d.toLocaleString();
        }
        function renderGenerationDetail(asset){
            const gen = generationFor(asset);
            const params = gen.params || asset.metadata?.params || {};
            const extra = {};
            if(params && Object.keys(params).length) extra.params = params;
            if(gen.workflow_json) extra.workflow_json = gen.workflow_json;
            if(gen.raw_usage) extra.raw_usage = gen.raw_usage;
            const rows = [
                ['提示词', asset.prompt || gen.prompt || '-'],
                ['模型', asset.model || gen.model || '-'],
                ['来源', asset.source_type || gen.source_type || '-'],
                ['尺寸', dimsFor(asset)],
                ['Seed', gen.seed || '-'],
                ['Provider', gen.provider_name || gen.provider_id || '-'],
                ['任务 ID', gen.task_id || gen.prompt_id || gen.request_id || '-'],

        function assetDownloadName(asset){
            if(!asset) return 'asset.png';
            const rawTitle = String(asset.title || `asset-${asset.id || Date.now()}`).trim();
            const safeTitle = rawTitle.split(/[\\/]/).pop().replace(/[<>:"/\\|?*\x00-\x1F]/g, '_').trim() || `asset-${asset.id || Date.now()}`;
            if(/\.[a-z0-9]{2,5}$/i.test(safeTitle)) return safeTitle;
            const source = String(asset.local_path || asset.local_url || '').split('?')[0].split('#')[0];
            const ext = source.includes('.') ? source.split('.').pop() : (asset.type === 'video' ? 'mp4' : 'png');
            const safeExt = /^[a-z0-9]{2,5}$/i.test(ext || '') ? ext : (asset.type === 'video' ? 'mp4' : 'png');
            return `${safeTitle}.${safeExt}`;
        }

        function downloadPickerTypes(asset, filename){
            const ext = (filename.split('.').pop() || '').toLowerCase();
            if(asset?.type === 'video' || ['mp4','webm','mov','m4v'].includes(ext)) {
                return [{description:'Video', accept:{'video/*':['.mp4','.webm','.mov','.m4v']}}];
            }
            return [{description:'Image', accept:{'image/*':['.png','.jpg','.jpeg','.webp']}}];
        }

        async function saveUrlWithBrowserPicker(url, filename, asset){
            const pickerOwner = typeof window.showSaveFilePicker === 'function' ? window : window.parent;
            const picker = pickerOwner?.showSaveFilePicker;
            if(typeof picker !== 'function') return null;
            const handle = await picker.call(pickerOwner, {
                suggestedName: filename,
                types: downloadPickerTypes(asset, filename)
            });
            const res = await fetch(url);
            if(!res.ok) throw new Error('读取素材文件失败');
            const blob = await res.blob();
            const writable = await handle.createWritable();
            await writable.write(blob);
            await writable.close();
            return {ok:true, filename};
        }

        async function saveUrlWithBackend(url, filename){
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), 12000);
            try {
                const res = await fetch('/api/app/save-as', {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({url, filename}),
                    signal:controller.signal
                });
                if(!res.ok) throw new Error('另存为失败');
                return await res.json();
            } finally {
                clearTimeout(timer);
            }
        }

        function fallbackBrowserDownload(href, filename){
            const link = document.createElement('a');
            link.href = href;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            link.remove();
            return {ok:true, fallback:true};
        }

        async function downloadAsset(asset){
            if(!asset) return;
            const filename = assetDownloadName(asset);
            const sourceUrl = asset.local_url || `/api/assets/${encodeURIComponent(asset.id)}/download`;
            const downloadUrl = `/api/assets/${encodeURIComponent(asset.id)}/download`;
            const previewBtn = $('previewDownloadBtn');
            const oldText = previewBtn?.querySelector('span')?.textContent || '下载';
            if(previewBtn && state.previewAsset?.id === asset.id) {
                previewBtn.disabled = true;
                previewBtn.querySelector('span').textContent = '保存中';
            }
            showToast('正在打开另存为...');
            try {
                let data = null;
                try {
                    data = await saveUrlWithBrowserPicker(downloadUrl, filename, asset);
                } catch(err) {
                    if(err?.name === 'AbortError') {
                        showToast('已取消保存');
                        return {ok:false, cancelled:true};
                    }
                    data = null;
                }
                if(!data) {
                    try {
                        data = await saveUrlWithBackend(sourceUrl, filename);
                    } catch(err) {
                        data = fallbackBrowserDownload(downloadUrl, filename);
                    }
                }
                showToast(data?.cancelled ? '已取消保存' : (data?.fallback ? '已交给浏览器下载' : '已另存为本地文件'));
                return data;
            } finally {
                if(previewBtn && state.previewAsset?.id === asset.id) {
                    previewBtn.disabled = false;
                    previewBtn.querySelector('span').textContent = oldText;
                }
            }
        }

        async function toggleFavorite(asset){

            const data = await fetch(`/api/assets/${encodeURIComponent(asset.id)}`, {
                method:'PUT',

        async function deleteAsset(asset){
            if(!asset) return;
            if(!confirm('删除后会从素材库移除。是否同时删除本地文件？')) return;
            await fetch(`/api/assets/${encodeURIComponent(asset.id)}?delete_file=true`, { method:'DELETE' }).then(jsonOrThrow);

                : `<div class="preview-media-wrap"><img class="preview-media" src="${esc(asset.local_url)}" alt=""></div>`;

        async function handleAssetAction(action, asset){
            closeContext();
            if(action === 'select') return toggleSelect(asset);
            if(action === 'canvas') sendAssetToCanvas(asset);
            if(action === 'preview') openPreview(asset);
            if(action === 'download') await downloadAsset(asset).catch(err => showToast(err.message));
            if(action === 'favorite') await toggleFavorite(asset).catch(err => showToast(err.message));
            if(action === 'prompt') sendPromptToTextImage(asset?.prompt || '');
            if(action === 'reuse') reuseAssetGeneration(asset);
            if(action === 'delete') await deleteAsset(asset).catch(err => showToast(err.message));

        async function uploadAssets(files){
            const list = [...(files || [])].filter(file => file.type.startsWith('image/') || file.type.startsWith('video/'));
            if(!list.length) return;
            const form = new FormData();
            list.forEach(file => form.append('files', file));
            showToast('正在上传素材...');
            const data = await fetch('/api/assets/upload', { method:'POST', body:form }).then(jsonOrThrow);
            await loadAssets();
            await loadCloudMediaStatus();
            showToast(`已上传 ${data.items?.length || list.length} 个素材`);
        }

        function setSyncBusy(busy){
            state.syncBusy = busy;
            ['syncNowBtn', 'restoreMissingBtn', 'syncPruneBtn'].forEach(id => {
                const btn = $(id);
                if(btn) btn.disabled = busy;
            });
        }

        function renderCloudMediaStatus(data){
            const local = data?.local || {};
            const remote = data?.remote || {};
            const sync = data?.sync || {};
            const last = sync.last_result || {};
            const remoteCount = remote.count ?? remote.total ?? 0;
            $('syncLocalCount').textContent = String(local.count || 0);
            $('syncLocalSize').textContent = formatBytes(local.size_bytes || 0);
            $('syncSyncedCount').textContent = String(local.synced || 0);
            $('syncPendingCount').textContent = String(local.pending || 0);
            $('syncFailedCount').textContent = String(local.failed || 0);
            $('syncLastTime').textContent = formatTime(local.last_synced_at || last.finished_at || 0);
            $('syncRemoteCount').textContent = data?.logged_in ? String(remoteCount) : '-';
            $('syncRemoteSize').textContent = data?.logged_in ? formatBytes(remote.size_bytes || 0) : '-';
            $('cloudMediaStatus').textContent = data?.logged_in
                ? `云端已连接，已同步 ${local.synced || 0} / ${local.count || 0} 个本地文件。${sync.running ? ' 后台同步中。' : ''}`
                : '登录云端账户后可以同步素材到 R2。';
            const finished = last.finished_at ? new Date(last.finished_at * 1000).toLocaleString() : '';
            $('cloudMediaLastResult').textContent = finished
                ? `最近同步：${finished}，上传 ${last.uploaded || 0}，跳过 ${last.skipped || 0}，失败 ${last.failed_count || 0}。`
                : '自动同步会在素材生成、上传、扫描后触发，并每 10 分钟补偿未同步或失败文件。';
        }

        async function loadCloudMediaStatus(){
            try {
                const data = await fetch('/api/cloud/media/status').then(jsonOrThrow);
                renderCloudMediaStatus(data);
            } catch (err) {
                $('cloudMediaStatus').textContent = err.message || '读取云素材状态失败';
            }
        }

        async function runCloudMediaSync(options = {}){
            if(state.syncBusy) return;
            if(options.delete_remote_missing && !confirm('会删除云端不在本地素材库里的文件，确定继续？')) return;
            setSyncBusy(true);
            showToast('正在同步云素材...');
            try {
                const data = await fetch('/api/cloud/media/sync', {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({
                        missing_only: options.missing_only !== false,
                        retry_failed: options.retry_failed !== false,
                        delete_remote_missing: !!options.delete_remote_missing,
                        limit: 5000
                    })
                }).then(jsonOrThrow);
                await loadAssets();
                await loadCloudMediaStatus();
                const failed = data.failed?.length || 0;
                showToast(`同步完成：上传 ${data.uploaded || 0}，跳过 ${data.skipped || 0}，失败 ${failed}`);
            } finally {
                setSyncBusy(false);
            }
        }

        async function restoreCloudMedia(){
            if(state.syncBusy) return;
            setSyncBusy(true);
            showToast('正在从云端恢复缺失素材...');
            try {
                const data = await fetch('/api/cloud/media/restore', {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({ missing_only:true, limit:5000 })
                }).then(jsonOrThrow);
                await loadAssets();
                await loadCloudMediaStatus();
                const failed = data.failed_count || 0;
                const ignored = data.skipped_deleted || 0;
                showToast(`恢复完成：新增 ${data.restored || 0}，跳过 ${data.skipped || 0}，已删除忽略 ${ignored}，失败 ${failed}`);
            } finally {
                setSyncBusy(false);
            }
        }

            lucide.createIcons();
        }

        $('restoreMissingBtn').addEventListener('click', () => restoreCloudMedia().catch(err => showToast(err.message)));
        $('syncPruneBtn').addEventListener('click', () => {
            if(!confirm('清理云端会删除云端存在、但本地素材库没有记录的孤儿文件。确定继续吗？')) return;
            runCloudMediaSync({ missing_only:true, retry_failed:false, delete_remote_missing:true }).catch(err => showToast(err.message));
        });
        $('bulkCanvasBtn').addEventListener('click', bulkSendToCanvas);
        $('bulkFavBtn').addEventListener('click', () => bulkSetFavorite(true).catch(err => showToast(err.message)));
        $('bulkUnfavBtn').addEventListener('click', () => bulkSetFavorite(false).catch(err => showToast(err.message)));
        $('bulkDeleteBtn').addEventListener('click', () => bulkDeleteSelected().catch(err => showToast(err.message)));
        $('bulkClearBtn').addEventListener('click', () => { state.selected.clear(); renderAssets(); });
        $('contextMenu').addEventListener('click', event => {
            const action = event.target.closest('button')?.dataset.action;
            handleAssetAction(action, state.activeAsset);
        });
        $('previewDownloadBtn').addEventListener('click', () => downloadAsset(state.previewAsset).catch(err => showToast(err.message)));
        $('previewCanvasBtn').addEventListener('click', () => sendAssetToCanvas(state.previewAsset));
        $('previewReuseBtn').addEventListener('click', () => reuseAssetGeneration(state.previewAsset));
        document.addEventListener('click', closeContext);
        window.addEventListener('keydown', event => { if(event.key === 'Escape') closePreview(); });
        window.addEventListener('message', event => {
            if(event.data?.type === 'studio-theme') {
                document.documentElement.classList.toggle('studio-theme-dark', event.data.theme === 'dark');
            }
            if(event.data?.type === 'assets-refresh') loadAssets().catch(err => showToast(err.message));
        });

        Promise.all([loadAssets(), loadPrompts(), loadCloudMediaStatus()]).catch(err => showToast(err.message));
        setInterval(() => loadCloudMediaStatus().catch(() => {}), 30000);
        lucide.createIcons();
    </script>
</body>
</html>
