<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/logo.png" type="image/png">
    <title>GPT 对话</title>
    <script>
        (function(){
            try {
                var theme = localStorage.getItem('studio_theme') || localStorage.getItem('canvas_theme') || 'light';
                if(theme === 'dark') {
                    document.documentElement.classList.add('studio-theme-dark');
                    document.documentElement.classList.add('theme-dark');
                }
            } catch(e) {}
        })();
    </script>
    <script src="/static/vendor/tailwind/tailwindcss-cdn.js"></script>
    <script src="/static/vendor/lucide/lucide.min.js"></script>
    <script src="/static/theme.js?v=20260525-desktop-updater1"></script>
    <script src="/static/i18n.js?v=20260525-desktop-updater1"></script>
    <style>
:root { --ease:cubic-bezier(.4,0,.2,1); --content-width:1160px; --composer-safe-bottom:268px; }
        * { box-sizing:border-box; }
        body { margin:0; height:100vh; overflow:hidden; background:#f8fafc; color:#111827; font-family:'Inter',-apple-system,sans-serif; -webkit-font-smoothing:antialiased; }
        .chat-shell { height:100vh; display:flex; flex-direction:column; min-width:0; }
        .topbar { height:82px; padding:0 36px; border-bottom:1px solid #eef2f7; background:rgba(248,250,252,.88); backdrop-filter:blur(16px); z-index:5; }
        .topbar-inner { width:min(var(--content-width),100%); height:100%; margin:0 auto; display:flex; align-items:center; justify-content:space-between; gap:18px; }
        .title-block { min-width:0; }
        .title-block h1 { font-size:14px; font-weight:900; letter-spacing:.28em; text-transform:uppercase; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .title-block p { margin-top:5px; font-size:10px; color:#94a3b8; font-weight:800; }
        .top-actions { display:flex; align-items:center; gap:10px; position:relative; }
        .action-btn { height:40px; min-width:40px; padding:0 12px; border-radius:999px; display:flex; align-items:center; justify-content:center; gap:8px; background:#fff; border:1px solid #e8edf3; color:#475569; font-size:10px; font-weight:900; letter-spacing:.14em; transition:all .2s var(--ease); }
        .action-btn:hover { background:#f1f5f9; color:#111827; border-color:#dbe3ec; }
        .history-popover { position:absolute; top:54px; right:0; width:min(360px,calc(100vw - 36px)); max-height:520px; overflow:hidden; background:#fff; border:1px solid #e8edf3; border-radius:24px; box-shadow:0 24px 60px rgba(15,23,42,.14); padding:12px; display:none; z-index:20; }
        .history-popover.open { display:block; animation:popIn .18s var(--ease); }
        .thread-list { max-height:430px; overflow:auto; display:flex; flex-direction:column; gap:8px; padding-right:2px; }
        .thread-row { display:grid; grid-template-columns:minmax(0,1fr) 34px; gap:6px; align-items:stretch; }
        .thread-item { width:100%; border:1px solid transparent; background:#f8fafc; border-radius:16px; padding:13px 14px; text-align:left; transition:all .2s var(--ease); min-height:58px; min-width:0; }
        .thread-item:hover { background:#f1f5f9; }
        .thread-item.active { background:#111827; color:#fff; box-shadow:0 12px 24px rgba(0,0,0,.12); }
        .thread-delete { width:34px; border-radius:14px; display:flex; align-items:center; justify-content:center; color:#cbd5e1; transition:all .2s var(--ease); }
        .thread-delete:hover { background:#fee2e2; color:#dc2626; }
        .messages { flex:1; overflow:auto; padding:34px 42px var(--composer-safe-bottom); display:flex; flex-direction:column; align-items:center; gap:18px; }
        .bubble-row { width:min(var(--content-width),100%); display:flex; gap:12px; align-items:flex-end; }
        .bubble-row.user { justify-content:flex-end; }
        .bubble { max-width:min(780px,78%); border-radius:24px; padding:15px 18px; font-size:14px; line-height:1.7; white-space:pre-wrap; word-break:break-word; box-shadow:0 1px 0 rgba(0,0,0,.03); }
        .bubble.user { background:#111827; color:white; border-bottom-right-radius:8px; }
        .bubble.assistant { background:#fff; border:1px solid #edf2f7; border-bottom-left-radius:8px; }
        .bubble.assistant.streaming::after { content:""; display:inline-block; width:7px; height:1.2em; margin-left:3px; border-radius:999px; background:#111827; vertical-align:-.2em; animation:cursorBlink .9s steps(2,end) infinite; }
        .bubble img.generated { display:block; width:min(460px,100%); border-radius:18px; margin-top:10px; border:1px solid rgba(0,0,0,.06); cursor:zoom-in; }
        .thumbs { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
        .thumb { width:58px; height:58px; border-radius:14px; object-fit:cover; border:1px solid rgba(255,255,255,.28); }
        .assistant .thumb { border-color:#e5e7eb; }
        .composer-wrap { position:absolute; left:0; right:0; bottom:0; padding:24px 42px 30px; background:linear-gradient(to top,#f8fafc 82%,rgba(248,250,252,0)); }
        .composer { width:min(var(--content-width),100%); margin:0 auto; min-height:184px; background:rgba(255,255,255,.96); border:1px solid #e8edf3; border-radius:30px; box-shadow:0 14px 38px rgba(15,23,42,.08); padding:12px; display:flex; flex-direction:column; gap:10px; }
        .mode-switch { background:#f8fafc; border:1px solid #edf2f7; border-radius:999px; padding:2px; display:flex; gap:2px; }
        .mode-switch button { height:30px; min-width:70px; border-radius:999px; display:flex; align-items:center; justify-content:center; gap:5px; color:#64748b; font-size:10px; font-weight:600; letter-spacing:.02em; transition:all .2s var(--ease); }
        .mode-switch button.active { background:#fff; color:#111827; box-shadow:0 1px 3px rgba(15,23,42,.08); }
        /* Provider Switch */
        .provider-switch { background:#f8fafc; border:1px solid #edf2f7; border-radius:999px; padding:2px; display:grid; grid-template-columns:1fr 1fr; gap:2px; }
        .provider-switch button { height:30px; padding:0 10px; white-space:nowrap; border-radius:999px; display:flex; align-items:center; justify-content:center; gap:5px; color:#64748b; font-size:10px; font-weight:600; letter-spacing:.02em; transition:all .2s var(--ease); }
        .provider-switch button.active { background:#fff; color:#111827; box-shadow:0 1px 3px rgba(15,23,42,.08); }
        .provider-select { min-width:112px; height:30px; border:0; border-radius:999px; background:#fff; color:#111827; padding:0 10px; outline:none; font-size:10px; font-weight:700; }
        .attach-btn { height:30px; padding:0 12px; border-radius:999px; display:flex; align-items:center; justify-content:center; gap:6px; background:#fff; border:1px solid #e8edf3; color:#475569; font-size:10px; font-weight:800; transition:all .2s var(--ease); }
        .attach-btn:hover { color:#111827; border-color:#dbe3ec; background:#f8fafc; }
        .image-controls { display:flex; align-items:center; justify-content:flex-end; gap:8px; min-width:0; }
        .image-controls.hidden { display:none; }
        .mini-ratio { display:flex; gap:2px; background:#f8fafc; border:1px solid #edf2f7; border-radius:999px; padding:2px; overflow:auto; }
        .mini-ratio button { height:28px; min-width:42px; border-radius:999px; display:flex; align-items:center; justify-content:center; gap:4px; color:#64748b; font-size:10px; font-weight:600; letter-spacing:0; transition:all .2s var(--ease); }
        .mini-ratio button.active { background:#fff; color:#111827; box-shadow:0 1px 3px rgba(15,23,42,.08); }
        .resolution-toggle { flex:0 0 auto; background:#f8fafc; border:1px solid #edf2f7; border-radius:999px; padding:2px; display:flex; gap:2px; }
        .resolution-option { height:28px; min-width:40px; border-radius:999px; display:flex; align-items:center; justify-content:center; color:#64748b; font-size:10px; font-weight:600; transition:all .2s var(--ease); }
        .resolution-option.active { background:#fff; color:#111827; box-shadow:0 1px 3px rgba(15,23,42,.08); }
        .composer-body { min-height:148px; border:1px solid #f1f5f9; background:#fbfdff; border-radius:22px; padding:14px; display:flex; flex-direction:column; gap:10px; }
        .composer-body.drag-over { border-color:#cbd5e1; background:#f8fafc; box-shadow:inset 0 0 0 1px #e2e8f0; }
        .image-mode-head { display:none; flex-direction:column; align-items:stretch; gap:14px; }
        .composer-body.image-mode { min-height:256px; padding:18px; border-radius:26px; }
        .composer-body.image-mode .image-mode-head { display:flex; }
        .image-ref-row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
        .image-ref-row-items { display:flex; align-items:center; gap:10px; flex-wrap:wrap; min-width:0; }
        .image-ref-row .ref-chip { width:74px; height:74px; border-radius:20px; margin:0; }
        .image-ref-row .ref-chip img { width:100%; height:100%; object-fit:cover; border-radius:20px; }
        .image-ref-row .ref-chip button { top:4px; right:4px; width:20px; height:20px; border-radius:999px; background:rgba(15,23,42,.78); color:#fff; font-size:12px; }
        .composer-body.image-mode > .ref-strip { display:none; }
        .ref-upload-tile { width:74px; min-height:74px; border-radius:22px; background:#f8fafc; border:1px solid #edf2f7; color:#94a3b8; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; font-size:11px; font-weight:900; flex:0 0 auto; }
        .ref-upload-tile:hover { color:#111827; border-color:#dbe3ec; background:#f8fafc; }
        .image-mode-copy { display:none; }
        .composer-body.image-mode textarea { min-height:112px; font-size:18px; line-height:1.6; }
        .composer-body.image-mode .composer-inside-foot { align-items:center; }
        .composer-body.image-mode .inline-controls { width:100%; align-items:center; gap:10px; }
        .composer-body.image-mode .provider-switch { min-height:42px; padding:4px; border-radius:22px; background:#f1f5f9; grid-template-columns:minmax(108px,.8fr) minmax(150px,1.2fr); }
        .composer-body.image-mode .provider-select { height:34px; min-width:0; border-radius:18px; font-size:12px; background:#fff; }
        .composer-body.image-mode .image-controls { display:flex; flex:1; justify-content:flex-start; gap:10px; }
        .composer-body.image-mode #providerSwitchWrap,
        .composer-body.image-mode #imageControls { display:none; }
        .composer-body.image-mode .mini-ratio,
        .composer-body.image-mode .resolution-toggle { min-height:42px; border-radius:22px; background:#f1f5f9; padding:4px; }
        .composer-body.image-mode .mini-ratio button,
        .composer-body.image-mode .resolution-option { height:32px; font-size:12px; font-weight:900; }
        .image-quick-controls { position:relative; display:flex; align-items:center; gap:8px; }
        .image-quick-controls.hidden { display:none; }
        .param-chip { min-height:42px; padding:0 16px; border-radius:999px; background:#fff; border:1px solid #e8edf3; display:flex; align-items:center; justify-content:center; gap:8px; font-size:13px; font-weight:900; color:#111827; white-space:nowrap; }
        .model-chip { width:46px; height:46px; border-radius:999px; background:#f1f5f9; color:#111827; display:flex; align-items:center; justify-content:center; transition:all .2s var(--ease); }
        .model-chip:hover,.model-chip.active { background:#e2e8f0; transform:translateY(-1px); }
        .model-chip-icon { width:24px; height:24px; border-radius:999px; display:flex; align-items:center; justify-content:center; color:#475569; }
        .image-model-menu,
        .image-param-panel { display:none; position:absolute; right:0; bottom:56px; z-index:40; background:#fff; border:1px solid #dbe3ec; box-shadow:0 24px 60px rgba(15,23,42,.18); }
        .image-model-menu.open,
        .image-param-panel.open { display:block; animation:popIn .18s var(--ease); }
        .image-model-menu { width:270px; max-height:420px; overflow:auto; border-radius:22px; padding:10px; }
        .model-menu-item { width:100%; min-height:46px; border-radius:14px; display:flex; align-items:center; gap:10px; padding:0 10px; color:#334155; font-size:14px; font-weight:700; text-align:left; }
        .model-menu-item:hover { background:#f8fafc; color:#111827; }
        .model-menu-item.active { color:#111827; }
        .model-menu-item .check { margin-left:auto; color:#111827; opacity:0; }
        .model-menu-item.active .check { opacity:1; }
        .image-param-panel { width:min(430px,calc(100vw - 42px)); border-radius:24px; padding:18px; }
        .param-section + .param-section { margin-top:18px; }
        .param-title { font-size:13px; font-weight:800; color:#64748b; margin-bottom:10px; }
        .quality-options { display:grid; grid-template-columns:repeat(4,1fr); gap:4px; background:#f1f5f9; padding:4px; border-radius:999px; }
        .quality-options button { height:40px; border-radius:999px; color:#475569; font-size:13px; font-weight:800; }
        .quality-options button.active { background:#fff; color:#111827; box-shadow:0 1px 3px rgba(15,23,42,.08); }
        .dimension-row { display:grid; grid-template-columns:1fr 36px 1fr; gap:10px; align-items:center; margin-bottom:14px; }
        .dimension-row label { height:44px; border-radius:14px; background:#f8fafc; display:flex; align-items:center; gap:8px; padding:0 12px; color:#64748b; font-size:13px; font-weight:800; }
        .dimension-row input { min-width:0; width:100%; border:0; outline:0; background:transparent; color:#111827; font-size:16px; font-weight:800; }
        .swap-size-btn { height:36px; border-radius:999px; display:flex; align-items:center; justify-content:center; color:#94a3b8; }
        .swap-size-btn:hover { background:#f8fafc; color:#111827; }
        .size-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
        .size-grid button { min-height:76px; border:1px solid #dbe3ec; border-radius:14px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; color:#334155; font-size:14px; font-weight:800; background:#fff; }
        .size-grid button:hover { border-color:#94a3b8; }
        .size-grid button.active { background:#f1f5f9; color:#111827; border-color:#cbd5e1; }
        .count-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; }
        .count-grid button { height:42px; border:1px solid #dbe3ec; border-radius:14px; color:#334155; font-size:14px; font-weight:800; background:#fff; }
        .count-grid button.active { background:#f1f5f9; color:#111827; border-color:#cbd5e1; }
        textarea { width:100%; flex:1; min-height:82px; max-height:168px; resize:none; outline:none; border:0; padding:2px; font-size:14px; line-height:1.65; background:transparent; }
        .attachment-stack { display:flex; flex-direction:column; align-items:flex-start; gap:8px; min-width:0; }
        .composer-inside-foot { display:flex; align-items:flex-end; justify-content:space-between; gap:12px; }
        .left-tools { display:flex; align-items:center; gap:8px; min-width:0; flex-wrap:wrap; }
        .inline-controls { display:flex; align-items:center; gap:8px; min-width:0; flex-wrap:wrap; }
        .send-btn { width:44px; height:44px; border-radius:999px; display:flex; align-items:center; justify-content:center; background:#111827; color:#fff; transition:all .2s var(--ease); flex:0 0 auto; }
        .send-btn:disabled { opacity:.45; cursor:not-allowed; }
        .ref-strip { display:flex; align-items:center; gap:8px; overflow:auto; min-width:0; max-width:680px; min-height:0; }
        .ref-strip:empty { display:none; }
        .ref-chip { position:relative; width:54px; height:54px; border-radius:14px; overflow:hidden; border:1px solid #e5e7eb; background:#fff; flex:0 0 auto; }
        .ref-chip img { width:100%; height:100%; object-fit:cover; }
        .ref-chip button { position:absolute; top:3px; right:3px; width:18px; height:18px; border-radius:50%; background:rgba(255,255,255,.92); font-size:12px; line-height:18px; }
        .chat-lightbox { position:fixed; inset:0; z-index:80; display:none; align-items:center; justify-content:center; padding:28px; background:rgba(248,250,252,.92); backdrop-filter:blur(18px); }
        .chat-lightbox.open { display:flex; animation:popIn .18s var(--ease); }
        .chat-lightbox-card { position:relative; width:min(1380px,100%); height:min(86vh,920px); border-radius:30px; background:#f8fafc; box-shadow:0 28px 80px rgba(15,23,42,.18); overflow:hidden; display:flex; align-items:center; justify-content:center; }
        .chat-lightbox-card img { max-width:100%; max-height:100%; object-fit:contain; display:block; }
        .chat-lightbox-actions { position:absolute; top:22px; right:22px; display:flex; gap:10px; z-index:2; }
        .chat-lightbox-actions button { width:54px; height:54px; border-radius:999px; display:flex; align-items:center; justify-content:center; background:#111827; color:#fff; box-shadow:0 14px 34px rgba(15,23,42,.18); }
        .chat-lightbox-actions .close { background:#fff; color:#111827; border:1px solid #e8edf3; }
        .chat-lightbox-meta { position:absolute; left:22px; bottom:22px; right:22px; border-radius:22px; background:rgba(255,255,255,.92); border:1px solid #e8edf3; padding:14px 18px; color:#334155; font-size:13px; font-weight:700; line-height:1.55; max-height:120px; overflow:auto; }
        /* MS provider indicator badge */
        .ms-badge { display:inline-flex; align-items:center; gap:4px; font-size:9px; font-weight:800; letter-spacing:.12em; text-transform:uppercase; background:#0d1117; color:#7ee787; border-radius:999px; padding:3px 8px; }
        @keyframes popIn { from { opacity:0; transform:translateY(-6px) scale(.98); } to { opacity:1; transform:translateY(0) scale(1); } }
        @keyframes cursorBlink { 0%,45% { opacity:1; } 46%,100% { opacity:0; } }
        @media (max-width:900px){
            .topbar { padding-left:18px; padding-right:18px; }
            .messages { padding:24px 18px var(--composer-safe-bottom); }
            .composer-wrap { padding:20px 18px 24px; }
            .composer { min-height:296px; }
            .inline-controls { align-items:stretch; flex-direction:column; flex:1; }
            .image-controls { align-items:stretch; flex-direction:column; }
            .composer-body.image-mode .image-mode-copy { font-size:16px; }
            .composer-body.image-mode .provider-switch { grid-template-columns:1fr; }
            .composer-body.image-mode .image-controls { width:100%; }
            .resolution-toggle { align-self:flex-start; }
            .composer-inside-foot { align-items:flex-end; }
            .ref-strip { max-width:100%; }
            .bubble { max-width:88%; }
            .action-btn span { display:none; }
        }
    </style>

<body>
    <div class="chat-shell">
        <header class="topbar">
            <div class="topbar-inner">
                <div class="title-block">
                    <h1 id="chatTitle" data-i18n="chat.newConversation">新对话</h1>
                    <p id="modelLabel">Ready</p>
                </div>
                <div class="top-actions">
                    <button onclick="newConversation()" class="action-btn" title="新建对话" data-i18n-title="chat.newConversation"><i data-lucide="plus" class="w-4 h-4"></i><span data-i18n="chat.new">NEW</span></button>
                    <button onclick="toggleHistory()" class="action-btn" title="历史对话" data-i18n-title="chat.history"><i data-lucide="history" class="w-4 h-4"></i><span data-i18n="chat.history">HISTORY</span></button>
                    <div id="historyPopover" class="history-popover">
                        <div class="flex items-center justify-between px-2 pb-3">
                            <span class="text-[10px] font-black uppercase tracking-[0.3em] text-gray-400" data-i18n="chat.historyTitle">Conversations</span>
                            <button onclick="toggleHistory(false)" class="text-gray-400 hover:text-black"><i data-lucide="x" class="w-4 h-4"></i></button>
                        </div>
                        <div id="threadList" class="thread-list"></div>
                    </div>
                </div>
            </div>
        </header>

        <section id="messages" class="messages"></section>

        <div class="composer-wrap">
            <div class="composer">
                <div id="composerBody" class="composer-body">
                    <input id="imageUploadInput" type="file" accept="image/*" multiple hidden onchange="handleAttachInput(this)">
                    <div id="imageModeHead" class="image-mode-head">
                        <div class="image-ref-row">
                            <div id="imageRefRow" class="image-ref-row-items"></div>
                            <button class="ref-upload-tile" type="button" onclick="openAttachPicker()" title="上传参考图">
                                <i data-lucide="image" class="w-5 h-5"></i>
                                <span>参考图</span>
                            </button>
                        </div>
                        <div class="image-mode-copy">今天我们要创作什么</div>
                    </div>
                    <textarea id="messageInput" rows="4" placeholder="输入消息，Enter 发送..." data-i18n-placeholder="chat.inputPlaceholder" oninput="autoGrow(this)" onkeydown="handleKey(event)"></textarea>
                    <div id="refStrip" class="ref-strip"></div>
                    <div class="composer-inside-foot">
                        <div class="left-tools">
                            <div class="inline-controls">
                                <button id="attachBtn" class="attach-btn" type="button" onclick="openAttachPicker()" title="上传图片">
                                    <i data-lucide="image-plus" class="w-3.5 h-3.5"></i>
                                    <span id="attachBtnText">图片</span>
                                </button>
                                <div class="mode-switch">
                                    <button id="chatModeBtn" class="active" onclick="setMode('chat')"><i data-lucide="message-circle" class="w-3.5 h-3.5"></i><span data-i18n="chat.chatMode">Chat</span></button>
                                    <button id="imageModeBtn" onclick="setMode('image')"><i data-lucide="image-plus" class="w-3.5 h-3.5"></i><span data-i18n="chat.imageMode">Image</span></button>
                                </div>
                                <div id="providerSwitchWrap" class="provider-switch">
                                    <select id="providerSelect" class="provider-select" onchange="setProvider(this.value)"></select>
                                    <select id="modelSelect" class="provider-select" onchange="setActiveModel(this.value)"></select>
                                </div>
                                <div id="imageControls" class="image-controls hidden">
                                    <div class="mini-ratio">
                                        <button id="chat-ratio-square" class="active" onclick="setChatRatio('square')"><i data-lucide="square" class="w-3 h-3"></i>1:1</button>
                                        <button id="chat-ratio-portrait" onclick="setChatRatio('portrait')"><i data-lucide="rectangle-vertical" class="w-3 h-3"></i>2:3</button>
                                        <button id="chat-ratio-landscape" onclick="setChatRatio('landscape')"><i data-lucide="rectangle-horizontal" class="w-3 h-3"></i>3:2</button>
                                        <button id="chat-ratio-portrait43" onclick="setChatRatio('portrait43')"><i data-lucide="rectangle-vertical" class="w-3 h-3"></i>3:4</button>
                                        <button id="chat-ratio-landscape43" onclick="setChatRatio('landscape43')"><i data-lucide="rectangle-horizontal" class="w-3 h-3"></i>4:3</button>
                                        <button id="chat-ratio-story" onclick="setChatRatio('story')"><i data-lucide="smartphone" class="w-3 h-3"></i>9:16</button>
                                        <button id="chat-ratio-wide" onclick="setChatRatio('wide')"><i data-lucide="monitor" class="w-3 h-3"></i>16:9</button>
                                    </div>
                                    <div class="resolution-toggle" title="分辨率" data-i18n-title="chat.resolution">
                                        <button id="chat-res-1k" class="resolution-option active" onclick="setChatResolution('1k')">1K</button>
                                        <button id="chat-res-2k" class="resolution-option" onclick="setChatResolution('2k')">2K</button>
                                    </div>
                                </div>
                                <div id="imageQuickControls" class="image-quick-controls hidden">
                                    <button id="imageParamChip" class="param-chip" type="button" onclick="toggleParamPanel()">
                                        <span id="imageParamLabel">中 · 1:1 · 1 img</span>
                                        <i data-lucide="chevron-up" class="w-3.5 h-3.5"></i>
                                    </button>
                                    <button id="imageModelChip" class="model-chip" type="button" onclick="toggleModelMenu()" title="选择生图模型">
                                        <span id="imageModelIcon" class="model-chip-icon"><i data-lucide="circle-dot" class="w-5 h-5"></i></span>
                                    </button>
                                    <div id="imageModelMenu" class="image-model-menu"></div>
                                    <div id="imageParamPanel" class="image-param-panel">
                                        <div class="param-section">
                                            <div class="param-title">质量</div>
                                            <div id="qualityOptions" class="quality-options"></div>
                                        </div>
                                        <div class="param-section">
                                            <div class="param-title">尺寸</div>
                                            <div class="dimension-row">
                                                <label>W <input id="imageWidthInput" type="number" min="256" max="4096" step="16" value="1024" oninput="setCustomImageSize()"></label>
                                                <button class="swap-size-btn" type="button" onclick="swapImageSize()" title="交换宽高"><i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i></button>
                                                <label>H <input id="imageHeightInput" type="number" min="256" max="4096" step="16" value="1024" oninput="setCustomImageSize()"></label>
                                            </div>
                                            <div id="sizePresetGrid" class="size-grid"></div>
                                        </div>
                                        <div class="param-section">
                                            <div class="param-title">Image</div>
                                            <div id="imageCountGrid" class="count-grid"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <button id="sendBtn" onclick="sendMessage()" class="send-btn" title="发送" data-i18n-title="chat.send"><i data-lucide="send" class="w-5 h-5"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="chatLightbox" class="chat-lightbox" onclick="closeChatImagePreview(event)">
        <div class="chat-lightbox-card">
            <div class="chat-lightbox-actions">
                <button type="button" onclick="downloadChatPreview(event)" title="下载"><i data-lucide="download" class="w-6 h-6"></i></button>
                <button type="button" class="close" onclick="closeChatImagePreview(event)" title="关闭"><i data-lucide="x" class="w-7 h-7"></i></button>
            </div>
            <img id="chatLightboxImg" alt="">
            <div id="chatLightboxMeta" class="chat-lightbox-meta"></div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        function tr(key){ return window.StudioI18n ? StudioI18n.t(key) : key; }
        function defaultTitle(){ return tr('chat.newConversation'); }
        function setChatTitle(title){
            document.getElementById('chatTitle').textContent = title || defaultTitle();
        }
        function applyLanguage(lang){
            if(lang && window.StudioI18n) StudioI18n.set(lang);
            document.title = tr('chat.title');
            if(!currentConversation?.title || currentConversation.title === '新对话' || currentConversation.title === 'New Chat') setChatTitle('');
            renderThreads();
        }
        window.addEventListener('message', event => {
            if(event.data?.type === 'studio-lang') applyLanguage(event.data.lang);
        });
        window.addEventListener('studio-lang-change', () => {
            document.title = tr('chat.title');
            if(!currentConversation?.title || currentConversation.title === '新对话' || currentConversation.title === 'New Chat') setChatTitle('');
            renderThreads();
        });
        function uuid(){
            if(crypto?.randomUUID) return crypto.randomUUID();
            return 'u-' + Math.random().toString(16).slice(2) + Date.now();
        }

        const USER_KEY = 'gpt_chat_browser_user';
        const MODE_KEY = 'gpt_chat_mode';
        const CHAT_PROVIDER_KEY = 'gpt_chat_provider';
        const CHAT_MODEL_KEY = 'gpt_chat_model';
        const IMAGE_PROVIDER_KEY = 'gpt_chat_image_provider';
        const IMAGE_MODEL_KEY = 'gpt_chat_image_model';
        const RATIO_KEY = 'gpt_chat_ratio';
        const RESOLUTION_KEY = 'gpt_chat_resolution';
        const QUALITY_KEY = 'gpt_chat_quality';
        const COUNT_KEY = 'gpt_chat_image_count';
        const SIZE_PRESET_KEY = 'gpt_chat_size_preset';
        const IMAGE_WIDTH_KEY = 'gpt_chat_image_width';
        const IMAGE_HEIGHT_KEY = 'gpt_chat_image_height';
        function savedValue(key, fallback){
            try {
                const value = localStorage.getItem(key);
                return value === null || value === '' ? fallback : value;
            } catch(e) {
                return fallback;
            }
        }
        function savedNumber(key, fallback){
            const value = Number(savedValue(key, fallback));
            return Number.isFinite(value) ? value : fallback;
        }
        const userId = localStorage.getItem(USER_KEY) || uuid();
        localStorage.setItem(USER_KEY, userId);
        const CLIENT_ID = localStorage.getItem('client_id') || userId;
        localStorage.setItem('client_id', CLIENT_ID);

        let conversations = [];
        let currentConversation = null;
        let mode = savedValue(MODE_KEY, 'image');
        let provider = savedValue(CHAT_PROVIDER_KEY, 'comfly');
        let msModel = '';
        let activeChatModel = savedValue(CHAT_MODEL_KEY, '');
        let activeImageProvider = savedValue(IMAGE_PROVIDER_KEY, 'comfly');
        let activeImageModel = savedValue(IMAGE_MODEL_KEY, '');
        let apiProviders = [];
        let chatProviderModels = {};
        let chatRatio = savedValue(RATIO_KEY, 'square');
        let chatResolution = savedValue(RESOLUTION_KEY, '1k');
        let chatQuality = savedValue(QUALITY_KEY, 'medium');
        let chatImageCount = savedNumber(COUNT_KEY, 1);
        let selectedSizePreset = savedValue(SIZE_PRESET_KEY, '1:1');
        let imageWidth = savedNumber(IMAGE_WIDTH_KEY, 1024);
        let imageHeight = savedNumber(IMAGE_HEIGHT_KEY, 1024);
        let refs = [];
        let config = { chat_model: 'gpt-5.5', image_model: 'gpt-image-2', ms_chat_models: [] };

        const SIZE_OPTIONS = {
            square: [['1024x1024','1k'], ['1536x1536','2k']],
            portrait: [['720x1080','1k'], ['1024x1536','2k']],
            portrait43: [['1008x1344','1k'], ['1536x2048','2k']],
            landscape43: [['1344x1008','1k'], ['2048x1536','2k']],
            landscape: [['1080x720','1k'], ['1536x1024','2k']],
            story: [['720x1280','1k'], ['1080x1920','2k']],
            wide: [['1280x720','1k'], ['1920x1080','2k']]
        };
        const QUALITY_OPTIONS = [
            ['auto','自动'],
            ['high','高'],
            ['medium','中'],
            ['low','低']
        ];
        const SIZE_PRESETS = [
            {key:'1:1', label:'1:1', ratio:'square', res:'1k', w:1024, h:1024},
            {key:'3:2', label:'3:2', ratio:'landscape', res:'1k', w:1080, h:720},
            {key:'2:3', label:'2:3', ratio:'portrait', res:'1k', w:720, h:1080},
            {key:'4:3', label:'4:3', ratio:'landscape43', res:'1k', w:1344, h:1008},
            {key:'3:4', label:'3:4', ratio:'portrait43', res:'1k', w:1008, h:1344},
            {key:'9:16', label:'9:16', ratio:'story', res:'1k', w:720, h:1280},
            {key:'1:1-2k', label:'1:1(2k)', ratio:'square', res:'2k', w:1536, h:1536},
            {key:'16:9-2k', label:'16:9(2k)', ratio:'wide', res:'2k', w:1920, h:1080},
            {key:'9:16-2k', label:'9:16(2k)', ratio:'story', res:'2k', w:1080, h:1920},
            {key:'16:9-4k', label:'16:9(4k)', ratio:'wide', res:'4k', w:3840, h:2160},
            {key:'9:16-4k', label:'9:16(4k)', ratio:'story', res:'4k', w:2160, h:3840},
            {key:'auto', label:'auto', ratio:'square', res:'1k', w:1024, h:1024}
        ];

        const headers = () => ({'Content-Type':'application/json', 'X-User-ID':userId});

        function persistComposerState(){
            try {
                localStorage.setItem(MODE_KEY, mode === 'chat' ? 'chat' : 'image');
                localStorage.setItem(CHAT_PROVIDER_KEY, provider || '');
                localStorage.setItem(CHAT_MODEL_KEY, activeChatModel || '');
                localStorage.setItem(IMAGE_PROVIDER_KEY, activeImageProvider || '');
                localStorage.setItem(IMAGE_MODEL_KEY, activeImageModel || '');
                localStorage.setItem(RATIO_KEY, chatRatio || 'square');
                localStorage.setItem(RESOLUTION_KEY, chatResolution || '1k');
                localStorage.setItem(QUALITY_KEY, chatQuality || 'medium');
                localStorage.setItem(COUNT_KEY, String(chatImageCount || 1));
                localStorage.setItem(SIZE_PRESET_KEY, selectedSizePreset || '1:1');
                localStorage.setItem(IMAGE_WIDTH_KEY, String(imageWidth || 1024));
                localStorage.setItem(IMAGE_HEIGHT_KEY, String(imageHeight || 1024));
            } catch(e) {}
        }

        function uniqueModels(list){
            const seen = new Set();
            return (list || []).map(item => String(item || '').trim()).filter(item => item && !seen.has(item) && seen.add(item));
        }
        function chatProviders(){
            const list = (apiProviders || []).filter(p => p.enabled !== false && (p.chat_models || []).length);
            if(config.ms_chat_models?.length && !list.some(p => p.id === 'modelscope')) list.push({id:'modelscope', name:'ModelScope', chat_models:config.ms_chat_models, image_models:[]});
            return list.length ? list : [{id:'comfly', name:'API', chat_models:[config.chat_model || 'gpt-4o-mini'], image_models:[config.image_model || 'gpt-image-2']}];
        }
        function imageProviders(){
            const list = (apiProviders || []).filter(p => p.enabled !== false && (p.image_models || []).length);
            return list.length ? list : [{id:'comfly', name:'API', image_models:[config.image_model || 'gpt-image-2'], chat_models:[config.chat_model || 'gpt-4o-mini']}];
        }
        function providerById(id, kind='chat'){
            const list = kind === 'image' ? imageProviders() : chatProviders();
            return list.find(p => p.id === id) || list[0];
        }
        function currentProviderId(){
            return mode === 'image' ? activeImageProvider : provider;
        }
        function modelListForCurrent(){
            const item = providerById(currentProviderId(), mode === 'image' ? 'image' : 'chat');
            return uniqueModels(mode === 'image' ? item.image_models : item.chat_models);
        }
        function currentModel(){
            return mode === 'image' ? activeImageModel : (provider === 'modelscope' ? (msModel || activeChatModel) : activeChatModel);
        }
        function renderProviderControls(){
            const providerSelect = document.getElementById('providerSelect');
            const modelSelect = document.getElementById('modelSelect');
            const providers = mode === 'image' ? imageProviders() : chatProviders();
            const pid = currentProviderId();
            if(!providers.some(p => p.id === pid)) {
                if(mode === 'image') activeImageProvider = providers[0]?.id || 'comfly';
                else provider = providers[0]?.id || 'comfly';
            }
            const models = modelListForCurrent();
            if(mode === 'image' && !models.includes(activeImageModel)) activeImageModel = models[0] || config.image_model;
            if(mode === 'chat' && !models.includes(activeChatModel)) activeChatModel = chatProviderModels[provider] && models.includes(chatProviderModels[provider]) ? chatProviderModels[provider] : (models[0] || config.chat_model);
            if(mode === 'chat' && provider === 'modelscope') msModel = activeChatModel;
            providerSelect.innerHTML = providers.map(p => `<option value="${escapeHtml(p.id)}" ${p.id === currentProviderId() ? 'selected' : ''}>${escapeHtml(p.name || p.id)}</option>`).join('');
            modelSelect.innerHTML = models.map(m => `<option value="${escapeHtml(m)}" ${m === currentModel() ? 'selected' : ''}>${escapeHtml(m)}</option>`).join('');
            renderImageModelMenu();
            renderImageParamPanel();
        }

        function imageModelEntries(){
            const entries = [];
            imageProviders().forEach(p => {
                uniqueModels(p.image_models || []).forEach(model => {
                    entries.push({ provider:p, model, key:`${p.id}::${model}` });
                });
            });
            return entries;
        }
        function modelIconName(model){
            const text = String(model || '').toLowerCase();
            if(text.includes('nano') || text.includes('banana')) return 'sparkles';
            if(text.includes('flux')) return 'triangle';
            if(text.includes('luma')) return 'aperture';
            if(text.includes('gpt') || text.includes('image')) return 'circle-dot';
            return 'image';
        }
        function modelDisplayName(model){
            return String(model || '').replace(/^openai\//i, '').replace(/-/g, ' ').replace(/\bgpt\b/i, 'GPT').replace(/\bimage\b/i, 'Image').replace(/\bnano\b/i, 'Nano').replace(/\bbanana\b/i, 'Banana').trim();
        }
        function renderImageModelMenu(){
            const menu = document.getElementById('imageModelMenu');
            const chip = document.getElementById('imageModelIcon');
            if(!menu || !chip) return;
            const entries = imageModelEntries();
            const selectedKey = `${activeImageProvider}::${activeImageModel}`;
            chip.innerHTML = `<i data-lucide="${modelIconName(activeImageModel)}" class="w-5 h-5"></i>`;
            menu.innerHTML = entries.length ? entries.map(item => {
                const active = item.key === selectedKey;
                return `<button class="model-menu-item ${active ? 'active' : ''}" type="button" onclick="selectImageModel('${escapeJs(item.provider.id)}','${escapeJs(item.model)}')">
                    <span class="model-chip-icon"><i data-lucide="${modelIconName(item.model)}" class="w-4 h-4"></i></span>
                    <span>${escapeHtml(modelDisplayName(item.model))}</span>
                    <span class="check">✓</span>
                </button>`;
            }).join('') : `<div class="px-3 py-5 text-center text-xs font-bold text-gray-400">暂无生图模型</div>`;
            lucide.createIcons();
        }
        function selectImageModel(nextProvider, nextModel){
            activeImageProvider = nextProvider;
            activeImageModel = nextModel;
            closeImagePopovers();
            renderProviderControls();
            updateModelLabel();
            updateImageParamLabel();
            persistComposerState();
        }
        function toggleModelMenu(){
            const menu = document.getElementById('imageModelMenu');
            const panel = document.getElementById('imageParamPanel');
            const chip = document.getElementById('imageModelChip');
            if(!menu) return;
            panel?.classList.remove('open');
            const open = !menu.classList.contains('open');
            menu.classList.toggle('open', open);
            chip?.classList.toggle('active', open);
        }
        function toggleParamPanel(){
            const panel = document.getElementById('imageParamPanel');
            const menu = document.getElementById('imageModelMenu');
            if(!panel) return;
            menu?.classList.remove('open');
            document.getElementById('imageModelChip')?.classList.remove('active');
            panel.classList.toggle('open');
        }
        function closeImagePopovers(){
            document.getElementById('imageModelMenu')?.classList.remove('open');
            document.getElementById('imageParamPanel')?.classList.remove('open');
            document.getElementById('imageModelChip')?.classList.remove('active');
        }
        function renderImageParamPanel(){
            const qualityBox = document.getElementById('qualityOptions');
            const sizeBox = document.getElementById('sizePresetGrid');
            const countBox = document.getElementById('imageCountGrid');
            if(!qualityBox || !sizeBox || !countBox) return;
            qualityBox.innerHTML = QUALITY_OPTIONS.map(([key,label]) => `<button class="${chatQuality === key ? 'active' : ''}" type="button" onclick="setChatQuality('${key}')">${label}</button>`).join('');
            sizeBox.innerHTML = SIZE_PRESETS.map(item => `<button class="${selectedSizePreset === item.key ? 'active' : ''}" type="button" onclick="setImageSizePreset('${item.key}')"><i data-lucide="${item.label.includes('16:9') || item.label.includes('3:2') || item.label.includes('4:3') ? 'rectangle-horizontal' : item.label.includes('auto') ? 'sparkles' : 'rectangle-vertical'}" class="w-4 h-4"></i><span>${item.label}</span></button>`).join('');
            countBox.innerHTML = Array.from({length:10}, (_,i) => i + 1).map(num => `<button class="${chatImageCount === num ? 'active' : ''}" type="button" onclick="setChatImageCount(${num})">${num} img</button>`).join('');
            document.getElementById('imageWidthInput').value = imageWidth;
            document.getElementById('imageHeightInput').value = imageHeight;
            updateImageParamLabel();
            lucide.createIcons();
        }
        function setChatQuality(next){ chatQuality = next; renderImageParamPanel(); persistComposerState(); }
        function setChatImageCount(next){ chatImageCount = Math.max(1, Math.min(10, Number(next) || 1)); renderImageParamPanel(); persistComposerState(); }
        function setImageSizePreset(key){
            const item = SIZE_PRESETS.find(x => x.key === key) || SIZE_PRESETS[0];
            selectedSizePreset = item.key;
            imageWidth = item.w;
            imageHeight = item.h;
            chatRatio = item.ratio;
            chatResolution = item.res;
            updateChatResolutionUI();
            renderImageParamPanel();
            persistComposerState();
        }
        function setCustomImageSize(){
            const w = Number(document.getElementById('imageWidthInput')?.value || 0);
            const h = Number(document.getElementById('imageHeightInput')?.value || 0);
            if(w >= 256 && h >= 256){
                imageWidth = Math.min(4096, Math.max(256, Math.round(w / 16) * 16));
                imageHeight = Math.min(4096, Math.max(256, Math.round(h / 16) * 16));
                selectedSizePreset = 'custom';
                updateImageParamLabel();
                persistComposerState();
            }
        }
        function swapImageSize(){
            [imageWidth, imageHeight] = [imageHeight, imageWidth];
            selectedSizePreset = 'custom';
            renderImageParamPanel();
            persistComposerState();
        }
        function qualityLabel(){
            return (QUALITY_OPTIONS.find(([key]) => key === chatQuality) || QUALITY_OPTIONS[2])[1];
        }
        function sizeLabel(){
            const item = SIZE_PRESETS.find(x => x.key === selectedSizePreset);
            if(item) return item.label.replace(/\(.+\)/, '');
            const ratio = imageWidth === imageHeight ? '1:1' : imageWidth > imageHeight ? `${Math.round(imageWidth / Math.max(1, imageHeight) * 10) / 10}:1` : `1:${Math.round(imageHeight / Math.max(1, imageWidth) * 10) / 10}`;
            return ratio;
        }
        function updateImageParamLabel(){
            const label = document.getElementById('imageParamLabel');
            if(label) label.textContent = `${qualityLabel()} · ${sizeLabel()} · ${chatImageCount} img`;
        }
        function escapeJs(str){ return String(str || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'"); }

        async function loadConfig(){
            try {
                const data = await fetch('/api/config').then(r=>r.json());
                config = { ...config, ...data };
                apiProviders = Array.isArray(config.api_providers) ? config.api_providers : [];
                config.chat_model = (config.chat_models || []).find(m => m === 'gpt-5.5') || config.chat_model || 'gpt-5.5';
                config.image_model = config.image_model || ((config.image_models || [])[0]) || 'gpt-image-2';
                const chatProviderList = chatProviders();
                provider = chatProviderList.some(p => p.id === provider) ? provider : (chatProviderList[0]?.id || 'comfly');
                const chatModels = uniqueModels(providerById(provider, 'chat')?.chat_models || []);
                activeChatModel = chatModels.includes(activeChatModel) ? activeChatModel : (chatProviderModels[provider] && chatModels.includes(chatProviderModels[provider]) ? chatProviderModels[provider] : (chatModels[0] || config.chat_model));
                const imageProviderList = imageProviders();
                activeImageProvider = imageProviderList.some(p => p.id === activeImageProvider) ? activeImageProvider : (imageProviderList[0]?.id || 'comfly');
                const imageModels = uniqueModels(providerById(activeImageProvider, 'image')?.image_models || []);
                activeImageModel = imageModels.includes(activeImageModel) ? activeImageModel : (imageModels[0] || config.image_model);
                // Default MS model to first in list
                if (config.ms_chat_models?.length) msModel = config.ms_chat_models.includes(activeChatModel) ? activeChatModel : config.ms_chat_models[0];
                renderProviderControls();
                updateModelLabel();
                persistComposerState();
            } catch(e) {}
        }
        try {
            const apiChannel = new BroadcastChannel('studio-api');
            apiChannel.onmessage = async (e) => {
                if(e.data?.type === 'providers-changed'){
                    await loadConfig();
                    renderProviderControls();
                    updateModelLabel();
                }
            };
        } catch(e) {}

        function setProvider(p) {
            if(mode === 'image') activeImageProvider = p;
            else provider = p;
            const models = modelListForCurrent();
            if(mode === 'image') activeImageModel = models[0] || activeImageModel;
            else {
                activeChatModel = chatProviderModels[provider] && models.includes(chatProviderModels[provider]) ? chatProviderModels[provider] : (models[0] || activeChatModel);
                if(provider === 'modelscope') msModel = activeChatModel;
            }
            renderProviderControls();
            updateModelLabel();
            persistComposerState();
        }
        function setActiveModel(model){
            if(mode === 'image') activeImageModel = model;
            else {
                activeChatModel = model;
                chatProviderModels[provider] = model;
                if(provider === 'modelscope') msModel = model;
            }
            updateModelLabel();
            persistComposerState();
        }

        async function loadConversations(){
            const data = await fetch('/api/conversations', {headers:{'X-User-ID':userId}}).then(r=>r.json());
            conversations = data.conversations || [];
            renderThreads();
            if(!currentConversation && conversations[0]) await openConversation(conversations[0].id);
            if(!currentConversation) renderMessages([]);
        }

        function renderThreads(){
            const list = document.getElementById('threadList');
            list.innerHTML = '';
            if(!conversations.length){
                list.innerHTML = `<div class="px-3 py-8 text-center text-[11px] font-bold text-gray-300 uppercase tracking-widest">${tr('chat.noHistory')}</div>`;
                return;
            }
            conversations.forEach(item => {
                const row = document.createElement('div');
                row.className = 'thread-row';
                const btn = document.createElement('button');
                btn.className = `thread-item ${currentConversation?.id === item.id ? 'active' : ''}`;
                btn.onclick = () => openConversation(item.id, true);
                btn.innerHTML = `<div class="text-sm font-bold truncate">${escapeHtml(item.title || defaultTitle())}</div><div class="text-[11px] opacity-50 truncate mt-1">${escapeHtml(item.last_message || '')}</div>`;
                const del = document.createElement('button');
                del.className = 'thread-delete';
                del.title = tr('chat.deleteTitle');
                del.onclick = (event) => deleteConversation(item.id, event);
                del.innerHTML = '<i data-lucide="trash-2" class="w-4 h-4"></i>';
                row.appendChild(btn);
                row.appendChild(del);
                list.appendChild(row);
            });
            lucide.createIcons();
        }

        async function newConversation(){
            const data = await fetch('/api/conversations', {method:'POST', headers:headers(), body:JSON.stringify({title:'新对话'})}).then(r=>r.json());
            currentConversation = data.conversation;
            setChatTitle(currentConversation.title);
            await loadConversations();
            renderMessages([]);
            toggleHistory(false);
        }

        async function openConversation(id, closePanel=false){
            const data = await fetch(`/api/conversations/${id}`, {headers:{'X-User-ID':userId}}).then(r=>r.json());
            currentConversation = data.conversation;
            setChatTitle(currentConversation.title);
            renderThreads();
            renderMessages(currentConversation.messages || []);
            if(closePanel) toggleHistory(false);
        }

        async function deleteConversation(id, event){
            event.stopPropagation();
            if(!confirm(tr('chat.deleteConfirm'))) return;
            await fetch(`/api/conversations/${id}`, {method:'DELETE', headers:{'X-User-ID':userId}});
            const deletedCurrent = currentConversation?.id === id;
            if(deletedCurrent){ currentConversation = null; setChatTitle(''); renderMessages([]); }
            await loadConversations();
            if(deletedCurrent && conversations[0]) await openConversation(conversations[0].id);
        }

        function toggleHistory(force){
            const pop = document.getElementById('historyPopover');
            const shouldOpen = typeof force === 'boolean' ? force : !pop.classList.contains('open');
            pop.classList.toggle('open', shouldOpen);
            if(shouldOpen) lucide.createIcons();
        }

        document.addEventListener('click', (event) => {
            const actions = document.querySelector('.top-actions');
            if(actions && !actions.contains(event.target)) toggleHistory(false);
            const quick = document.getElementById('imageQuickControls');
            if(quick && !quick.contains(event.target)) closeImagePopovers();
        });

        function setMode(next){
            mode = next === 'chat' ? 'chat' : 'image';
            document.getElementById('chatModeBtn').classList.toggle('active', next === 'chat');
            document.getElementById('imageModeBtn').classList.toggle('active', next === 'image');
            document.getElementById('imageControls').classList.toggle('hidden', next !== 'image');
            document.getElementById('composerBody').classList.toggle('image-mode', next === 'image');
            document.getElementById('imageQuickControls')?.classList.toggle('hidden', next !== 'image');
            document.getElementById('providerSwitchWrap')?.classList.toggle('hidden', next === 'image');
            document.getElementById('attachBtnText').textContent = next === 'image' ? '参考图' : '图片';
            const input = document.getElementById('messageInput');
            if(input){
                input.placeholder = next === 'image' ? '今天我们要创作什么' : '输入消息，Enter 发送...';
                autoGrow(input);
            }
            if(next !== 'image') closeImagePopovers();
            renderProviderControls();
            renderRefs();
            updateModelLabel();
            updateImageParamLabel();
            lucide.createIcons();
            persistComposerState();
            updateComposerSafeArea(true);
        }

        function updateModelLabel(){
            let label = '';
            if (mode === 'image') {
                label = activeImageModel || config.image_model || 'Image';
            } else if (provider === 'modelscope') {
                label = msModel || (config.ms_chat_models?.[0]) || 'ModelScope';
                // Shorten the display label
                label = label.split('/').pop().split(':')[0];
            } else {
                label = activeChatModel || config.chat_model || 'Chat';
            }
            document.getElementById('modelLabel').textContent = label;
        }

        function setChatRatio(next, preferredSize = ''){
            chatRatio = next;
            ['square','portrait','portrait43','landscape43','landscape','story','wide'].forEach(item => {
                document.getElementById(`chat-ratio-${item}`).classList.toggle('active', item === next);
            });
            if(preferredSize){ const match = SIZE_OPTIONS[next].find(([value]) => value === preferredSize); if(match) chatResolution = match[1]; }
            const match = SIZE_OPTIONS[next]?.find(([, label]) => label === chatResolution) || SIZE_OPTIONS[next]?.[0];
            if(match){
                const [w,h] = match[0].split('x').map(Number);
                imageWidth = w || imageWidth;
                imageHeight = h || imageHeight;
                const preset = SIZE_PRESETS.find(item => item.ratio === next && item.res === chatResolution);
                selectedSizePreset = preset?.key || 'custom';
            }
            updateChatResolutionUI();
            updateImageParamLabel();
            persistComposerState();
        }

        function setChatResolution(next){
            chatResolution = next;
            const match = SIZE_OPTIONS[chatRatio]?.find(([, label]) => label === next) || SIZE_OPTIONS[chatRatio]?.[0];
            if(match){
                const [w,h] = match[0].split('x').map(Number);
                imageWidth = w || imageWidth;
                imageHeight = h || imageHeight;
                const preset = SIZE_PRESETS.find(item => item.ratio === chatRatio && item.res === next);
                selectedSizePreset = preset?.key || 'custom';
            }
            updateChatResolutionUI();
            renderImageParamPanel();
            persistComposerState();
        }
        function updateChatResolutionUI(){
            document.getElementById('chat-res-1k').classList.toggle('active', chatResolution === '1k');
            document.getElementById('chat-res-2k').classList.toggle('active', chatResolution === '2k');
        }

        function currentChatSize(){
            if(mode === 'image') return `${imageWidth}x${imageHeight}`;
            const options = SIZE_OPTIONS[chatRatio] || SIZE_OPTIONS.square;
            const match = options.find(([, label]) => label === chatResolution) || options[0];
            return match[0];
        }

        function renderMessages(messages){
            const box = document.getElementById('messages');
            box.innerHTML = '';
            if(!messages.length){
                box.innerHTML = `<div class="m-auto text-center opacity-20"><i data-lucide="messages-square" class="w-14 h-14 mx-auto stroke-[1px]"></i><div class="text-[10px] font-black tracking-[0.5em] uppercase mt-4">${tr('chat.ready')}</div></div>`;
                lucide.createIcons();
                return;
            }
            messages.forEach(addMessageBubble);
            scrollBottom();
        }

        function addMessageBubble(msg){
            const box = document.getElementById('messages');
            const row = document.createElement('div');
            row.className = `bubble-row ${msg.role === 'user' ? 'user' : 'assistant'}`;
            const bubble = document.createElement('div');
            bubble.className = `bubble ${msg.role === 'user' ? 'user' : 'assistant'}`;
            const text = document.createElement('div');
            text.textContent = msg.type === 'image' ? tr('chat.generated') : (msg.content || '');
            text.className = 'bubble-text';
            bubble.appendChild(text);
            if(msg.attachments?.length){
                const thumbs = document.createElement('div');
                thumbs.className = 'thumbs';
                msg.attachments.forEach(ref => thumbs.insertAdjacentHTML('beforeend', `<img class="thumb" src="${ref.url}">`));
                bubble.appendChild(thumbs);
            }
            if(msg.image_url){
                const img = document.createElement('img');
                img.className = 'generated';
                img.src = msg.image_url;
                img.onclick = () => openChatImagePreview(msg.image_url, msg.content || tr('chat.generated'));
                bubble.appendChild(img);
            }
            // Show model badge for assistant messages
            if(msg.role === 'assistant' && msg.model){
                const badge = document.createElement('div');
                const modelShort = msg.model.split('/').pop().split(':')[0];
                const isMs = msg.model.includes('/') && !msg.model.includes('gpt');
                badge.style.cssText = `margin-top:8px;font-size:9px;font-weight:700;opacity:.45;letter-spacing:.06em;`;
                badge.textContent = modelShort;
                bubble.appendChild(badge);
            }
            row.appendChild(bubble);
            box.appendChild(row);
            return {row, bubble, text};
        }

        let currentPreviewImage = '';
        function openChatImagePreview(url, meta=''){
            currentPreviewImage = url || '';
            const box = document.getElementById('chatLightbox');
            const img = document.getElementById('chatLightboxImg');
            const metaEl = document.getElementById('chatLightboxMeta');
            if(!box || !img) return;
            img.src = currentPreviewImage;
            if(metaEl) metaEl.textContent = meta || '';
            box.classList.add('open');
            lucide.createIcons();
        }

        function closeChatImagePreview(event){
            if(event && event.target !== event.currentTarget && !event.currentTarget?.classList?.contains('close')) return;
            event?.stopPropagation?.();
            const box = document.getElementById('chatLightbox');
            if(box) box.classList.remove('open');
        }

        function outputDownloadName(url){
            const clean = String(url || '').split('?')[0].split('#')[0];
            const name = decodeURIComponent(clean.split('/').pop() || '');
            return name || `chat-image-${Date.now()}.png`;
        }

        async function downloadDirectImage(event, url, filename){
            event?.preventDefault?.();
            event?.stopPropagation?.();
            if(!url) return;
            if(window.parent && window.parent !== window){
                const href = `/api/download-url?url=${encodeURIComponent(url)}&filename=${encodeURIComponent(filename || outputDownloadName(url))}`;
                window.parent.postMessage({type:'studio-download', href, filename: filename || outputDownloadName(url)}, '*');
                return;
            }
            try {
                const href = `/api/download-url?url=${encodeURIComponent(url)}&filename=${encodeURIComponent(filename || outputDownloadName(url))}`;
                const a = document.createElement('a');
                a.href = href;
                a.download = filename || outputDownloadName(url);
                document.body.appendChild(a);
                a.click();
                a.remove();
            } catch(err) {
                const res = await fetch('/api/download-url', {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({url, filename: filename || outputDownloadName(url)})
                });
                const blob = await res.blob();
                const href = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = href;
                a.download = filename || outputDownloadName(url);
                document.body.appendChild(a);
                a.click();
                a.remove();
                setTimeout(() => URL.revokeObjectURL(href), 1200);
            }
        }

        function downloadChatPreview(event){
            downloadDirectImage(event, currentPreviewImage, outputDownloadName(currentPreviewImage));
        }

        function openAttachPicker(){
            document.getElementById('imageUploadInput')?.click();
        }
        function handleAttachInput(input){
            uploadFiles(input.files);
            input.value = '';
        }
        async function uploadFiles(files){
            if(!files?.length) return;
            const form = new FormData();
            [...files].slice(0, 4 - refs.length).forEach(file => form.append('files', file));
            if(![...form.keys()].length) return;
            const btnText = document.getElementById('attachBtnText');
            const oldText = btnText?.textContent || '图片';
            if(btnText) btnText.textContent = '上传中';
            try {
                const data = await fetch('/api/ai/upload?temporary=true', {method:'POST', body:form}).then(async r => {
                    if(!r.ok) throw new Error((await r.json()).detail || '图片上传失败');
                    return r.json();
                });
                refs.push(...(data.files || []));
                renderRefs();
            } catch(err) {
                alert(err.message || '图片上传失败');
            } finally {
                if(btnText) btnText.textContent = oldText;
            }
        }

        function refChipMarkup(ref, i){
            return `<div class="ref-chip"><img src="${escapeHtml(ref.url)}" alt=""><button type="button" onclick="removeRef(${i})">×</button></div>`;
        }

        function renderRefs(){
            const markup = refs.map((ref,i) => refChipMarkup(ref, i)).join('');
            const strip = document.getElementById('refStrip');
            const imageRow = document.getElementById('imageRefRow');
            if(strip) strip.innerHTML = markup;
            if(imageRow) imageRow.innerHTML = markup;
            updateComposerSafeArea(true);
        }

        function removeRef(i){ refs.splice(i,1); renderRefs(); }
        window.addEventListener('message', event => {
            if(event.data?.type !== 'chat-add-reference') return;
            const incoming = (Array.isArray(event.data.refs) ? event.data.refs : [])
                .filter(ref => ref?.url)
                .slice(0, Math.max(0, 4 - refs.length))
                .map(ref => ({url:ref.url, name:ref.name || 'canvas-reference.png'}));
            if(incoming.length){
                refs.push(...incoming);
                renderRefs();
            }
            const input = document.getElementById('messageInput');
            if(event.data.message && input){
                input.value = event.data.message;
                autoGrow(input);
            }
            setMode('chat');
        });

        window.addEventListener('paste', e => {
            const files = [...(e.clipboardData?.items || [])].filter(x => x.kind === 'file' && x.type.startsWith('image/')).map(x => x.getAsFile());
            if(files.length) uploadFiles(files);
        });

        const composerBody = document.getElementById('composerBody');
        composerBody.addEventListener('dragover', e => {
            if(!hasImageFiles(e.dataTransfer?.items)) return;
            e.preventDefault();
            composerBody.classList.add('drag-over');
        });
        composerBody.addEventListener('dragleave', e => {
            if(!composerBody.contains(e.relatedTarget)) composerBody.classList.remove('drag-over');
        });
        composerBody.addEventListener('drop', e => {
            if(!hasImageFiles(e.dataTransfer?.items)) return;
            e.preventDefault();
            composerBody.classList.remove('drag-over');
            const files = [...(e.dataTransfer?.files || [])].filter(file => file.type.startsWith('image/'));
            uploadFiles(files);
        });

        function hasImageFiles(items){ return [...(items || [])].some(item => item.kind === 'file' && item.type.startsWith('image/')); }
        function autoGrow(el){
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 150) + 'px';
            updateComposerSafeArea(true);
        }
        function handleKey(e){ if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); } }

        async function sendMessage(){
            const input = document.getElementById('messageInput');
            let message = input.value.trim();
            if(!message && refs.length && mode === 'chat') message = '请识别并描述这张图片。';
            if(!message) return;
            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            const pendingRefs = refs.slice();
            refs = [];
            renderRefs();
            input.value = '';
            autoGrow(input);
            if(!currentConversation){
                currentConversation = {id:'', title:'新对话', messages:[]};
                document.getElementById('messages').innerHTML = '';
            }
            addMessageBubble({role:'user', content:message, attachments:pendingRefs});
            const assistantBubble = addMessageBubble({role:'assistant', content: mode === 'image' ? tr('chat.generatingImage') : ''});
            if(mode === 'chat') assistantBubble.bubble.classList.add('streaming');
            scrollBottom();
            try {
                if(mode === 'chat') {
                    await streamChatMessage(message, pendingRefs, assistantBubble);
                } else {
                    const data = await fetch('/api/chat', {
                        method:'POST',
                        headers:headers(),
                        body:JSON.stringify({
                            conversation_id: currentConversation.id || '',
                            message,
                            mode,
                            size: currentChatSize(),
                            quality: chatQuality,
                            image_count: chatImageCount,
                            model: activeChatModel || config.chat_model,
                            image_model: activeImageModel || config.image_model,
                            reference_images: pendingRefs,
                            provider: activeImageProvider,
                            client_id: CLIENT_ID,
                        })
                    }).then(async r => { if(!r.ok) throw new Error((await r.json()).detail || tr('chat.requestFailed')); return r.json(); });
                    currentConversation = data.conversation;
                    setChatTitle(currentConversation.title);
                    renderMessages(currentConversation.messages || []);
                    await loadConversations();
                }
            } catch(err) {
                renderMessages([...(currentConversation.messages || []), {role:'assistant', content:err.message || tr('chat.requestFailed')}]);
            } finally {
                btn.disabled = false;
                scrollBottom();
            }
        }

        async function streamChatMessage(message, pendingRefs, assistantBubble){
            const currentProvider = provider;
            const currentMsModel = provider === 'modelscope' ? (msModel || activeChatModel || (config.ms_chat_models?.[0] || '')) : '';
            const currentChatModel = activeChatModel || config.chat_model;

            const res = await fetch('/api/chat/stream', {
                method:'POST',
                headers:headers(),
                body:JSON.stringify({
                    conversation_id: currentConversation.id || '',
                    message,
                    mode:'chat',
                    model: currentProvider === 'modelscope' ? currentMsModel : currentChatModel,
                    ms_model: currentProvider === 'modelscope' ? currentMsModel : '',
                    provider: currentProvider,
                    reference_images: pendingRefs,
                    client_id: CLIENT_ID
                })
            });
            if(!res.ok) throw new Error((await res.json()).detail || tr('chat.requestFailed'));
            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            let fullText = '';
            while(true){
                const {value, done} = await reader.read();
                if(done) break;
                buffer += decoder.decode(value, {stream:true});
                const events = buffer.split('\n\n');
                buffer = events.pop() || '';
                for(const eventText of events){
                    const line = eventText.split('\n').find(item => item.startsWith('data:'));
                    if(!line) continue;
                    const event = JSON.parse(line.slice(5).trim());
                    if(event.type === 'meta'){
                        currentConversation = event.conversation;
                        setChatTitle(currentConversation.title);
                    }
                    if(event.type === 'delta'){
                        fullText += event.delta || '';
                        assistantBubble.text.textContent = fullText;
                        scrollBottom();
                    }
                    if(event.type === 'error') throw new Error(event.detail || tr('chat.requestFailed'));
                    if(event.type === 'done'){
                        assistantBubble.bubble.classList.remove('streaming');
                        currentConversation = event.conversation;
                        setChatTitle(currentConversation.title);
                        renderMessages(currentConversation.messages || []);
                        await loadConversations();
                    }
                }
            }
            assistantBubble.bubble.classList.remove('streaming');
        }

        function updateComposerSafeArea(keepBottom = false){
            requestAnimationFrame(() => {
                const wrap = document.querySelector('.composer-wrap');
                const box = document.getElementById('messages');
                if(!wrap || !box) return;
                const wasNearBottom = box.scrollHeight - box.scrollTop - box.clientHeight < 96;
                const safe = Math.ceil(wrap.getBoundingClientRect().height + 28);
                const minSafe = mode === 'image' ? 360 : 250;
                const next = Math.max(safe, minSafe);
                document.documentElement.style.setProperty('--composer-safe-bottom', `${next}px`);
                if(keepBottom || wasNearBottom) {
                    requestAnimationFrame(() => {
                        box.scrollTop = box.scrollHeight;
                    });
                }
            });
        }

        function scrollBottom(){
            updateComposerSafeArea(true);
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    const box = document.getElementById('messages');
                    box.scrollTop = box.scrollHeight;
                });
            });
        }
        function escapeHtml(str){ return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s])); }

        const composerWrapEl = document.querySelector('.composer-wrap');
        if(window.ResizeObserver && composerWrapEl) {
            new ResizeObserver(updateComposerSafeArea).observe(composerWrapEl);
        }
        window.addEventListener('resize', updateComposerSafeArea);

        window.onload = async () => {
            applyLanguage();
            chatQuality = ['auto','high','medium','low'].includes(chatQuality) ? chatQuality : 'medium';
            chatImageCount = Math.max(1, Math.min(10, Number(chatImageCount) || 1));
            if(SIZE_PRESETS.some(item => item.key === selectedSizePreset)) setImageSizePreset(selectedSizePreset);
            else {
                setChatRatio(SIZE_OPTIONS[chatRatio] ? chatRatio : 'square');
                setChatResolution(chatResolution || '1k');
            }
            await loadConfig();
            setMode(mode === 'chat' ? 'chat' : 'image');
            await loadConversations();
            updateComposerSafeArea();
        };
    </script>
</body>
</html>
