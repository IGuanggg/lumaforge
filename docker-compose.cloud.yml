services:
  lumaforge-cloud:
    build:
      context: .
      dockerfile: Dockerfile.cloud
    image: iguang9881/lumaforge-cloud:${CLOUD_APP_VERSION:-2.0.0}
    container_name: lumaforge-cloud
    restart: unless-stopped
    env_file:
      - .env.cloud
    environment:
      CLOUD_CONFIG_DB: /app/data/cloud_config.db
      CLOUD_CONFIG_PORT: 8787
      CLOUD_APP_VERSION: ${CLOUD_APP_VERSION:-2.0.0}
    ports:
      - "${CLOUD_BIND_HOST:-127.0.0.1}:${CLOUD_HTTP_PORT:-8787}:8787"
    volumes:
      - ${LUMAFORGE_CLOUD_DATA:-./cloud-data}:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
