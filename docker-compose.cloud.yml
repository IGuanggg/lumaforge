services:
  infinite-canvas-cloud:
    build:
      context: .
      dockerfile: Dockerfile.cloud
    container_name: infinite-canvas-cloud
    restart: unless-stopped
    env_file:
      - .env.cloud
    environment:
      CLOUD_CONFIG_DB: /app/data/cloud_config.db
      CLOUD_CONFIG_PORT: 8787
      CLOUD_APP_VERSION: ${CLOUD_APP_VERSION:-1.0.8}
    ports:
      - "${CLOUD_BIND_HOST:-127.0.0.1}:${CLOUD_HTTP_PORT:-8787}:8787"
    volumes:
      - ./cloud-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

